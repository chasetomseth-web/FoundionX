# ============================================================
# MerchantOS — GitHub Actions CI/CD Pipeline
# Stages: lint → test → build → deploy (staging) → deploy (prod)
# ============================================================

name: MerchantOS CI/CD

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────
  # JOB 1: Lint + Type Check
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run type-check

  # ──────────────────────────────────────────────────────────
  # JOB 2: Smoke Tests
  # ──────────────────────────────────────────────────────────
  test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY_TEST }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET_TEST }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build application (smoke build)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SITE_URL: https://staging.merchantos.app

      - name: Health check smoke test
        run: |
          node -e "
            const http = require('http');
            // Verify build artifacts exist
            const fs = require('fs');
            if (!fs.existsSync('.next/standalone/server.js')) {
              console.error('Build artifact missing: .next/standalone/server.js');
              process.exit(1);
            }
            console.log('Build artifacts verified ✓');
          "

  # ──────────────────────────────────────────────────────────
  # JOB 3: Build & Push Docker Images
  # ──────────────────────────────────────────────────────────
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/merchantos-frontend
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/merchantos-worker
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/merchantos-frontend:${{ steps.meta.outputs.version }},${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/merchantos-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_SITE_URL=${{ github.ref == 'refs/heads/main' && secrets.PROD_SITE_URL || secrets.STAGING_SITE_URL }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Build & push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/merchantos-worker:${{ steps.meta.outputs.version }},${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/merchantos-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────
  # JOB 4: Deploy to Staging (branch: staging)
  # ──────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/staging'
    environment:
      name: staging
      url: ${{ secrets.STAGING_SITE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/merchantos
            export IMAGE_TAG=${{ github.sha }}
            export REGISTRY=${{ env.REGISTRY }}
            export IMAGE_OWNER=${{ env.IMAGE_OWNER }}
            
            # Pull latest images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            
            # Run DB migrations (zero-downtime)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL=$DATABASE_URL \
              frontend npx prisma migrate deploy
            
            # Rolling update (start-first strategy)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d \
              --no-deps --scale frontend=2 frontend
            
            # Health check
            sleep 15
            curl -f http://localhost:3000/api/health || (docker compose rollback && exit 1)
            
            # Update workers
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d \
              --no-deps worker
            
            echo "Staging deployment complete ✓"

      - name: Notify staging deployment
        if: always()
        run: |
          echo "Staging deployment status: ${{ job.status }}"

  # ──────────────────────────────────────────────────────────
  # JOB 5: Deploy to Production (branch: main)
  # ──────────────────────────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ secrets.PROD_SITE_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/merchantos
            export IMAGE_TAG=${{ github.sha }}
            export REGISTRY=${{ env.REGISTRY }}
            export IMAGE_OWNER=${{ env.IMAGE_OWNER }}
            
            # Save current image tag for rollback
            echo $IMAGE_TAG > /opt/merchantos/.current-tag
            
            # Pull latest images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            
            # Run DB migrations (zero-downtime)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL=$DATABASE_URL \
              frontend npx prisma migrate deploy
            
            # Blue-green style rolling update
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d \
              --no-deps --scale frontend=2 frontend
            
            # Health check with retry
            for i in 1 2 3 4 5; do
              sleep 10
              if curl -sf http://localhost:3000/api/health; then
                echo "Health check passed ✓"
                break
              fi
              if [ $i -eq 5 ]; then
                echo "Health check failed — triggering rollback"
                /opt/merchantos/scripts/rollback.sh
                exit 1
              fi
            done
            
            # Update workers after frontend is healthy
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d \
              --no-deps worker
            
            # Cleanup old images
            docker image prune -f --filter "until=24h"
            
            echo "Production deployment complete ✓"

      - name: Send deployment notification
        if: always()
        run: |
          echo "Production deployment status: ${{ job.status }} — commit ${{ github.sha }}"

  # ──────────────────────────────────────────────────────────
  # JOB 6: Preview Deployment (Pull Requests)
  # ──────────────────────────────────────────────────────────
  preview:
    name: Preview Deployment (PR)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build preview
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_SITE_URL: https://pr-${{ github.event.number }}.preview.merchantos.app

      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🚀 Preview Build Ready\n\n**Build Status:** ✅ Success\n**Commit:** \`${{ github.sha }}\`\n**Branch:** \`${{ github.head_ref }}\`\n\nPreview URL: https://pr-${{ github.event.number }}.preview.merchantos.app`
            })
