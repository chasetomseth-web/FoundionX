# PgBouncer Configuration for MerchantOS
# Transaction pooling mode — optimal for Prisma/Next.js serverless
# Deploy alongside your PostgreSQL instance

[databases]
# Primary database connection
merchantos = host=YOUR_POSTGRES_HOST port=5432 dbname=YOUR_DB_NAME

# Read replica (optional — for analytics/reporting queries)
# merchantos_read = host=YOUR_READ_REPLICA_HOST port=5432 dbname=YOUR_DB_NAME

[pgbouncer]
# ============================================================
# POOLING MODE
# transaction = best for Prisma (short-lived connections)
# session = required if using SET/LISTEN/NOTIFY
# ============================================================
pool_mode = transaction

# ============================================================
# CONNECTION LIMITS
# ============================================================
# Max connections PgBouncer accepts from clients (app servers)
max_client_conn = 1000

# Default pool size per database/user pair
default_pool_size = 25

# Minimum pool size (keep warm connections)
min_pool_size = 5

# Reserve pool for emergency connections
reserve_pool_size = 10

# How long to wait before using reserve pool (seconds)
reserve_pool_timeout = 5

# Max connections per user (prevents one tenant from monopolizing)
max_user_connections = 50

# ============================================================
# TIMEOUTS
# ============================================================
# Client idle timeout (seconds) — disconnect idle clients
client_idle_timeout = 60

# Server idle timeout — return idle server connections to pool
server_idle_timeout = 600

# Query timeout — kill queries running longer than this (seconds)
query_timeout = 30

# Connection timeout — fail fast if pool is exhausted
connect_timeout = 15

# ============================================================
# AUTHENTICATION
# ============================================================
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# ============================================================
# LOGGING
# ============================================================
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

# ============================================================
# ADMIN INTERFACE
# ============================================================
listen_addr = 127.0.0.1
listen_port = 6432
admin_users = pgbouncer_admin

# ============================================================
# PERFORMANCE TUNING
# ============================================================
# TCP keepalive
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 10
tcp_keepcnt = 5

# Disable prepared statements (required for transaction mode)
# Prisma handles this automatically with ?pgbouncer=true in DATABASE_URL
ignore_startup_parameters = extra_float_digits,options

# ============================================================
# DEPLOYMENT NOTES
# ============================================================
# 1. Update DATABASE_URL to point to PgBouncer:
#    DATABASE_URL="postgresql://user:pass@localhost:6432/merchantos?pgbouncer=true&connection_limit=1"
#
# 2. The ?pgbouncer=true flag disables Prisma's prepared statements
#    (required for transaction pooling mode)
#
# 3. connection_limit=1 per Prisma instance — PgBouncer manages the pool
#
# 4. For serverless (Vercel/Lambda), use connection_limit=1 always
#
# 5. Monitor via: psql -h 127.0.0.1 -p 6432 -U pgbouncer_admin pgbouncer
#    SHOW POOLS; SHOW STATS; SHOW CLIENTS; SHOW SERVERS;
